<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医路通 CareRoute 管理后台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1A365D;--teal:#0D9488;--gold:#D4A843;--red:#DC2626;--green:#059669;--bg:#F1F5F9;--card:#FFFFFF;--text:#1E293B;--sub:#64748B;--border:#E2E8F0;--sidebar-w:230px}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei','Segoe UI',Roboto,sans-serif;background:var(--bg);display:flex;min-height:100vh;color:var(--text)}
.sidebar{width:var(--sidebar-w);background:var(--navy);color:#fff;min-height:100vh;position:fixed;left:0;top:0;bottom:0;padding:24px 0;display:flex;flex-direction:column}
.sidebar-logo{padding:0 20px;margin-bottom:32px}
.sidebar-logo .title{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sidebar-logo .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.sidebar-nav{flex:1}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;margin:2px 10px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:rgba(255,255,255,.65);transition:.15s;border:none;background:none;width:calc(100% - 20px);text-align:left;font-family:inherit}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--teal);color:#fff}
.nav-item .icon{font-size:18px;width:24px;text-align:center}
.sidebar-user{margin:12px 20px;padding:12px;background:rgba(255,255,255,.08);border-radius:10px;display:flex;align-items:center;gap:10px}
.sidebar-user .avatar{width:32px;height:32px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.sidebar-user .name{font-size:13px;font-weight:600}
.sidebar-user .role{font-size:10px;color:rgba(255,255,255,.5)}
.main{margin-left:var(--sidebar-w);flex:1;padding:24px 28px;max-width:calc(100vw - var(--sidebar-w))}
.page-header{margin-bottom:24px}.page-header h1{font-size:24px;font-weight:800}.page-header p{font-size:13px;color:var(--sub);margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.kpi-card .label{font-size:12px;color:var(--sub);font-weight:500;margin-bottom:6px}
.kpi-card .value{font-size:28px;font-weight:800}
.kpi-card .change{font-size:12px;margin-top:4px}
.change-up{color:var(--green)}.change-down{color:var(--red)}
.card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border);margin-bottom:20px}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#E8F4F0;color:var(--teal);font-weight:600}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
td{padding:12px;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:#F8FAFC}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.s-confirmed{background:#EFF6FF;color:#2563EB}.s-completed{background:#F0FDF4;color:var(--green)}
.s-pending{background:#FFFBEB;color:#D97706}.s-cancelled{background:#FEF2F2;color:var(--red)}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:#0B8277}
.btn-o{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-o:hover{background:var(--bg)}
.btn-s{padding:5px 10px;font-size:11px}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.fi{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--card)}
.fi:focus{outline:none;border-color:var(--teal)}select.fi{cursor:pointer}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--card);border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:800;margin-bottom:16px}
.mc{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub)}
.tab-row{display:flex;gap:0;margin-bottom:16px}
.tab-btn{padding:8px 16px;border:none;background:none;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
</style>
</head>

// ---- RENDER ----
function renderPage(p){
  const m=document.getElementById('main-content');
  switch(p){
    case 'dashboard':m.innerHTML=D();setTimeout(initCharts,100);break;
    case 'orders':m.innerHTML=O();break;
    case 'providers':m.innerHTML=V();break;
    case 'settlements':m.innerHTML=S();break;
    case 'reviews':m.innerHTML=R();break;
  }
}
function D(){
  const rev=(RV.reduce((s,r)=>s+r.o,0)/RV.length).toFixed(1);
  const tr=OD.filter(o=>o.s!=='cancelled').reduce((s,o)=>s+o.t,0);

  const ip=OD.filter(o=>o.s==='in_progress'||o.s==='confirmed').length;

function initCharts(){

  if(c1)new Chart(c1,{type:'doughnut',data:{labels:[t('chart.cits'),t('chart.direct'),t('chart.referral')],datasets:[{data:[4,1,1],backgroundColor:['#0D9488','#1A365D','#D4A843'],borderWidth:0}]},options:{plugins:{legend:{position:'bottom',labels:{padding:16,font:{size:12}}}}}});
  const c2=document.getElementById('chStatus');
  if(c2)new Chart(c2,{type:'bar',data:{labels:[t('chart.completed'),t('chart.inProgress'),t('chart.confirmed'),t('chart.cancelled')],datasets:[{data:[3,1,1,1],backgroundColor:['#059669','#D97706','#2563EB','#DC2626'],borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}

function oTbl(ods){return `<table><thead><tr><th>${t('orders.th.orderNo')}</th><th>${t('orders.th.customer')}</th><th>${t('orders.th.package')}</th><th>${t('orders.th.provider')}</th><th>${t('orders.th.total')}</th><th>${t('orders.th.channel')}</th><th>${t('orders.th.status')}</th><th>${t('orders.th.date')}</th><th>${t('orders.th.actions')}</th></tr></thead><tbody>${ods.map(o=>`<tr><td style="font-weight:600;color:var(--navy)">${o.id}</td><td>${o.c}<br><span style="font-size:10px;color:var(--sub)">${o.n}</span></td><td>${o.pkg}<br><span style="font-size:10px;color:var(--sub)">${o.st!=='N/A'?t('orders.stage')+' '+o.st:''} ${o.ad>0?'+'+o.ad+' '+t('orders.addons'):''}</span></td><td>${o.pv}</td><td style="font-weight:600">¥${o.t.toLocaleString()}</td><td>${o.ch.toUpperCase()}</td><td><span class="status ${sClass(o.s)}">${sLabel(o.s)}</span></td><td style="font-size:12px">${o.d}</td><td><button class="btn btn-o btn-s" onclick="odDetail('${o.id}')">${t('orders.view')}</button></td></tr>`).join('')}</tbody></table>`}
function O(){
  return `<div class="page-header"><h1>${t('orders.title')}</h1><p>${t('orders.subtitle')}</p></div><div class="card"><div class="filters">
<select class="fi" onchange="filterO()" id="fS"><option value="all">${t('orders.fStatus')}</option><option value="confirmed">${t('orders.fConfirmed')}</option><option value="in_progress">${t('orders.fInProgress')}</option><option value="completed">${t('orders.fCompleted')}</option><option value="cancelled">${t('orders.fCancelled')}</option></select>
<select class="fi" onchange="filterO()" id="fCh"><option value="all">${t('orders.fChannel')}</option><option value="cits">${t('orders.fCits')}</option><option value="direct">${t('orders.fDirect')}</option><option value="referral">${t('orders.fReferral')}</option></select>
<input class="fi" placeholder="${t('orders.fSearch')}" oninput="filterO()" id="fQ" style="flex:1;min-width:200px">
<button class="btn btn-o btn-s" onclick="document.getElementById('fS').value='all';document.getElementById('fCh').value='all';document.getElementById('fQ').value='';filterO()">${t('orders.fReset')}</button></div>
<div class="table-wrap" id="oTbl">${oTbl(OD)}</div></div>`;
}
function filterO(){const s=document.getElementById('fS').value,ch=document.getElementById('fCh').value,q=document.getElementById('fQ').value.toLowerCase();const f=OD.filter(o=>(s==='all'||o.s===s)&&(ch==='all'||o.ch===ch)&&(!q||o.id.toLowerCase().includes(q)||o.c.toLowerCase().includes(q)));document.getElementById('oTbl').innerHTML=oTbl(f)}
function odDetail(id){const o=OD.find(x=>x.id===id);if(!o)return;const ov=document.createElement('div');ov.className='modal-overlay';ov.onclick=function(e){if(e.target===this)this.remove()};ov.innerHTML=`<div class="modal"><button class="mc" onclick="this.closest('.modal-overlay').remove()">×</button><h2>${t('orders.detail')}: ${o.id}</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px"><div><strong>${t('orders.dCustomer')}:</strong> ${o.c} (${o.n})</div><div><strong>${t('orders.dPackage')}:</strong> ${o.pkg}</div><div><strong>${t('orders.dProvider')}:</strong> ${o.pv}</div><div><strong>${t('orders.dTotal')}:</strong> ¥${o.t.toLocaleString()}</div><div><strong>${t('orders.dChannel')}:</strong> ${o.ch.toUpperCase()}</div><div><strong>${t('orders.dStatus')}:</strong> <span class="status ${sClass(o.s)}">${sLabel(o.s)}</span></div><div><strong>${t('orders.dDate')}:</strong> ${o.d}</div><div><strong>${t('orders.dAddons')}:</strong> ${o.ad}</div></div></div>`;document.body.appendChild(ov)}

function V(){
  return `<div class="page-header"><h1>${t('providers.title')}</h1><p>${t('providers.subtitle')}</p></div><div class="card"><div class="filters"><button class="btn btn-p btn-s">${t('providers.add')}</button><button class="btn btn-o btn-s">${t('providers.export')}</button></div><div class="table-wrap"><table><thead><tr><th>${t('providers.th.id')}</th><th>${t('providers.th.name')}</th><th>${t('providers.th.type')}</th><th>${t('providers.th.ownership')}</th><th>${t('providers.th.city')}</th><th>${t('providers.th.services')}</th><th>${t('providers.th.orders')}</th><th>${t('providers.th.status')}</th><th>${t('providers.th.exp')}</th><th>${t('providers.th.actions')}</th></tr></thead><tbody>${PV.map(p=>`<tr><td style="font-weight:600;color:var(--navy)">${p.id}</td><td>${p.en}<br><span style="font-size:10px;color:var(--sub)">${p.n}</span></td><td>${t('providers.type.'+(p.tp==='physical_exam'?'pe':'dental'))}</td><td>${t('providers.ownership.'+p.ow)}</td><td>${p.ct}</td><td style="text-align:center;font-weight:600">${p.sv}</td><td style="text-align:center">${p.od}</td><td><span class="status s-completed">${t('providers.status.active')}</span></td><td style="font-size:12px">${p.ex}</td><td><button class="btn btn-o btn-s" onclick="pvDetail('${p.id}')">${t('providers.manage')}</button></td></tr>`).join('')}</tbody></table></div></div>`;
}
function pvDetail(id){const p=PV.find(x=>x.id===id);if(!p)return;const ov=document.createElement('div');ov.className='modal-overlay';ov.onclick=function(e){if(e.target===this)this.remove()};ov.innerHTML=`<div class="modal"><button class="mc" onclick="this.closest('.modal-overlay').remove()">×</button><h2>${p.en}</h2><div style="font-size:12px;color:var(--sub);margin-bottom:16px">${p.n}</div><div class="tab-row"><button class="tab-btn active">${t('providers.dTab.info')}</button><button class="tab-btn">${t('providers.dTab.services')} (${p.sv})</button><button class="tab-btn">${t('providers.dTab.apikey')}</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px"><div><strong>${t('providers.th.type')}:</strong> ${t('providers.type.'+(p.tp==='physical_exam'?'pe':'dental'))}</div><div><strong>${t('providers.th.ownership')}:</strong> ${t('providers.ownership.'+p.ow)}</div><div><strong>${t('providers.th.city')}:</strong> ${p.ct}</div><div><strong>${t('providers.dTotalOrders')}:</strong> ${p.od}</div><div><strong>${t('providers.dContractExp')}:</strong> ${p.ex}</div><div><strong>${t('providers.dIntegration')}:</strong> Hybrid (API + HIS)</div></div><div style="margin-top:16px;background:#F8FAFC;padding:12px;border-radius:8px;font-family:monospace;font-size:12px"><div style="font-weight:600;margin-bottom:6px">API Key:</div><div>${p.ak}</div><div style="margin-top:8px"><button class="btn btn-o btn-s" style="color:var(--red);border-color:var(--red)">${t('providers.dRegen')}</button></div></div></div>`;document.body.appendChild(ov)}

function S(){
  return `<div class="page-header"><h1>${t('settlements.title')}</h1><p>${t('settlements.subtitle')}</p></div><div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)"><div class="kpi-card"><div class="label">${t('settlements.kpi.payable')}</div><div class="value">¥813K</div></div><div class="kpi-card"><div class="label">${t('settlements.kpi.pending')}</div><div class="value">3</div></div><div class="kpi-card"><div class="label">${t('settlements.kpi.premium')}</div><div class="value">¥325.2K</div></div></div><div class="card"><div class="filters"><button class="btn btn-p btn-s">${t('settlements.generate')}</button><input type="month" class="fi" value="2026-07"></div><div class="table-wrap"><table><thead><tr><th>${t('settlements.th.id')}</th><th>${t('settlements.th.provider')}</th><th>${t('settlements.th.period')}</th><th>${t('settlements.th.settlement')}</th><th>${t('settlements.th.premium')}</th><th>${t('settlements.th.net')}</th><th>${t('settlements.th.status')}</th><th>${t('settlements.th.invoice')}</th><th>${t('settlements.th.actions')}</th></tr></thead><tbody>${ST.map(s=>`<tr><td style="font-weight:600;color:var(--navy)">${s.id}</td><td>${s.pv}</td><td>${s.pd}</td><td style="font-weight:600">¥${s.ts.toLocaleString()}</td><td style="color:var(--teal)">¥${s.tp.toLocaleString()}</td><td style="font-weight:600">¥${s.net.toLocaleString()}</td><td><span class="status ${s.s==='paid'?'s-completed':s.s==='confirmed'?'s-pending':'s-cancelled'}">${t('settlements.'+s.s)}</span></td><td style="font-size:12px">${s.inv||t('settlements.pending')}</td><td>${s.s==='draft'?`<button class="btn btn-o btn-s">${t('settlements.confirm')}</button>`:s.s==='confirmed'?`<button class="btn btn-p btn-s">${t('settlements.pay')}</button>`:`<button class="btn btn-o btn-s">${t('settlements.view')}</button>`}</td></tr>`).join('')}</tbody></table></div></div>`;
}

function R(){
  const a=(RV.reduce((s,r)=>s+r.o,0)/RV.length).toFixed(1);
  return `<div class="page-header"><h1>${t('reviews.title')}</h1><p>${t('reviews.subtitle')}</p></div><div class="kpi-grid" style="grid-template-columns:repeat(2,1fr)"><div class="kpi-card"><div class="label">${t('reviews.kpi.avg')}</div><div class="value">${a} ⭐</div><div class="change change-up">${t('kpi.from')} ${RV.length} ${t('kpi.reviews')}</div></div><div class="kpi-card"><div class="label">${t('reviews.kpi.total')}</div><div class="value">${RV.length}</div><div class="change change-up">${t('reviews.kpi.positive')}</div></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>${t('reviews.th.id')}</th><th>${t('reviews.th.customer')}</th><th>${t('reviews.th.package')}</th><th>${t('reviews.th.overall')}</th><th>${t('reviews.th.staff')}</th><th>${t('reviews.th.english')}</th><th>${t('reviews.th.wait')}</th><th>${t('reviews.th.report')}</th><th>${t('reviews.th.comment')}</th><th>${t('reviews.th.public')}</th><th>${t('reviews.th.actions')}</th></tr></thead><tbody>${RV.map(r=>`<tr><td>${r.id}</td><td>${r.c}</td><td>${r.pkg}</td><td>${'★'.repeat(r.o)}${'☆'.repeat(5-r.o)}</td><td>${r.stf}</td><td>${r.en}</td><td>${r.w}</td><td>${r.r}</td><td style="max-width:200px;white-space:normal;font-size:12px">${r.cm}</td><td>${r.pub?`<span class="status s-completed">${t('reviews.public')}</span>`:`<span class="status s-cancelled">${t('reviews.hidden')}</span>`}</td><td><button class="btn btn-o btn-s">${r.pub?t('reviews.hide'):t('reviews.show')}</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

renderPage('dashboard');
</script>
</body>
</html>
